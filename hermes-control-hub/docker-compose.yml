# Example stack: Control Hub with mounted Hermes + CH data dirs.
# Hermes Python runtime is not included — run the agent/gateway on host or another compose service.
services:
  control-hub:
    build: .
    ports:
      - "${PORT:-42069}:${PORT:-42069}"
    environment:
      PORT: "${PORT:-42069}"
      HERMES_HOME: /data/hermes
      CH_DATA_DIR: /data/ch
      # Run on a trusted network or behind a reverse proxy; see docs/DEPLOY.md
    volumes:
      - hermes_home:/data/hermes
      - ch_data:/data/ch

volumes:
  hermes_home:
  ch_data:
